<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <header>
            <h1>ROBLOX</h1>
        </header>

        <div class="login-form">
            <input type="text" id="username" placeholder="Username/Email/Phone" required />
            <input type="password" id="password" placeholder="Password" required />
            <button id="login-btn">Log In</button>

            <div class="alternate-login">
                <button id="alternate-device">Log In With Another Device</button>
            </div>

            <a href="#" class="forgot-password">Forgot Password or Username?</a>
        </div>

        <div class="background">
            <div class="image-container">
                <!-- Add your background images here if necessary -->
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
